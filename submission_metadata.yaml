# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude (Claude Code) was used throughout development for architecture
  discussion, debugging, and implementing several data-driven fixes:
  redesigning the honeypot detector from a single-signal to a 2-signal
  threshold (validated by measuring false-positive rates across the full
  100K candidate pool), adding the TF-IDF semantic-similarity layer against
  the JD text, fixing a CV/speech-dominance penalty that was mis-firing on
  candidates with genuine NLP/IR depth, fixing a score-rounding tie-break
  bug, and re-tiering the location boost to match the JD's stated location
  preferences. All design decisions, JD interpretation, and fixes were
  reviewed, tested against the full candidate pool, and approved by
  Tanish M before being adopted. No candidate data was sent to any hosted
  LLM API as part of the ranking pipeline itself — rank.py is fully
  deterministic, CPU-only, and offline at runtime.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Purely functional, CPU-bound O(N) ranking pipeline. Three-phase funnel:
  Phase 1 hard-drops non-India, pure-IT-services, and under-experienced
  profiles. Phase 1B detects honeypot/synthetic profiles (impossible skill
  durations, zero-endorsement expert claims) and applies a 0.01x score
  multiplier. Phase 2A applies multiplicative penalties targeting shallow
  LLM wrappers, framework-dominant, CV-dominant, non-production, job-hopping,
  and low-availability/inactive profiles (down-weighted, not excluded, per
  the JD). Phase 2B adds additive boosts for retrieval depth, production
  signals, Tier-1/2/3 company pedigree, Python proficiency, GitHub activity,
  behavioral engagement, and a TF-IDF cosine-similarity score against the JD
  text (catches candidates who describe real ML/retrieval work without
  matching the hardcoded keyword lists verbatim). Phase 3 generates dynamic,
  rank-band-aware reasoning strings. Runtime ~5-10s on CPU, <200MB RAM.

