# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Purely functional, CPU-bound O(N) ranking pipeline. Three-phase funnel:
  Phase 1 hard-drops non-India, pure-IT-services, and under-experienced
  profiles. Phase 1B detects honeypot/synthetic profiles (impossible skill
  durations, zero-endorsement expert claims) and applies a 0.01x score
  multiplier. Phase 2A applies multiplicative penalties targeting shallow
  LLM wrappers, framework-dominant, CV-dominant, non-production, job-hopping,
  and low-availability/inactive profiles (down-weighted, not excluded, per
  the JD). Phase 2B adds additive boosts for retrieval depth, production
  signals, Tier-1/2/3 company pedigree, Python proficiency, GitHub activity,
  behavioral engagement, and a TF-IDF cosine-similarity score against the JD
  text (catches candidates who describe real ML/retrieval work without
  matching the hardcoded keyword lists verbatim). Phase 3 generates dynamic,
  rank-band-aware reasoning strings. Runtime ~5-10s on CPU, <200MB RAM.

